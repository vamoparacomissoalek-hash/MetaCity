<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>META STORE - Minecraft Style</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #3c8527;
            --mc-green-hover: #53a039;
            --mc-gray: #313233;
            --mc-dark: #1e1e1f;
            --mc-border: #000000;
            --mc-text: #ffffff;
            --mc-stone: #5a5a5a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--mc-gray);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Textura sutil */
            color: var(--mc-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 1.2rem;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--mc-stone);
            border: 4px solid var(--mc-border);
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: inset -4px -4px 0px #333, inset 4px 4px 0px #888;
        }

        .login-box h2 { font-size: 2.5rem; margin-top: 0; text-shadow: 2px 2px #000; }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 2px solid #555;
            color: #0f0;
            font-family: 'VT323';
            font-size: 1.2rem;
        }

        /* BOTÃO ESTILO MINECRAFT */
        .mc-button {
            background: #7c7c7c;
            border: 3px solid #000;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: inset -3px -3px 0px #444, inset 3px 3px 0px #aaa;
            font-family: 'VT323';
            font-size: 1.3rem;
            width: 100%;
        }

        .mc-button:hover { background: var(--mc-green); box-shadow: inset -3px -3px 0px #255018, inset 3px 3px 0px #5eb83e; }
        .mc-button:disabled { filter: grayscale(1); cursor: not-allowed; }

        /* HEADER */
        header {
            background: var(--mc-dark);
            width: 100%;
            padding: 20px;
            border-bottom: 4px solid var(--mc-green);
            text-align: center;
        }

        h1 { font-size: 4rem; color: var(--mc-green); margin: 0; text-shadow: 4px 4px #000; }

        .user-bar {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-around;
            border: 2px dashed var(--mc-green);
        }

        /* CONTEÚDO PRINCIPAL */
        .main-container {
            display: flex;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }

        /* GRID DE PRODUTOS */
        .products-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: #4e4e4e;
            border: 3px solid #000;
            padding: 15px;
            text-align: center;
            box-shadow: inset -2px -2px 0px #222, inset 2px 2px 0px #777;
        }

        .product-card h3 { margin: 10px 0; color: #ffcc00; }

        /* HISTÓRICO */
        .history-panel {
            flex: 1;
            background: var(--mc-dark);
            border: 3px solid var(--mc-green);
            padding: 15px;
            height: fit-content;
        }

        .history-panel h3 { border-bottom: 2px solid var(--mc-green); padding-bottom: 5px; }
        .history-item {
            font-size: 0.9rem;
            padding: 5px;
            border-bottom: 1px solid #333;
            color: #aaa;
        }

        #custom-alert {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--mc-green); border: 3px solid #000; padding: 15px; z-index: 50000;
        }
    </style>
</head>
<body onload="init()">

    <div id="custom-alert">COMPRA REALIZADA COM SUCESSO!</div>

    <div id="login-screen">
        <div class="login-box">
            <h2>MOJANG LOGIN</h2>
            <input type="text" id="login-nick" placeholder="NICK MINECRAFT">
            <input type="number" id="login-money" placeholder="SALDO INICIAL">
            <button class="mc-button" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <header>
        <h1>META STORE</h1>
        <div class="user-bar" id="user-bar">
            <span>PLAYER: <b id="display-nick">-</b></span>
            <span>SALDO: <b id="display-balance">0</b> MC</span>
            <span style="cursor:pointer; color:red" onclick="logout()">[SAIR]</span>
        </div>
    </header>

    <div class="main-container">
        <main class="products-grid" id="products-grid"></main>

        <aside class="history-panel">
            <h3>HISTÓRICO</h3>
            <div id="history-list">
                <div class="history-item">Nenhuma compra ainda.</div>
            </div>
        </aside>
    </div>

    <script>
        let user = null;
        let history = JSON.parse(localStorage.getItem('meta_history')) || [];

        // 10 PRODUTOS
        const produtos = [];
        for(let i=1; i<=10; i++) {
            produtos.push({
                id: i,
                nome: `PRODUTO ${i}`,
                preco: i * 500 // Preços variados: 500, 1000, 1500...
            });
        }

        function init() {
            const savedUser = localStorage.getItem('meta_user');
            if (savedUser) {
                user = JSON.parse(savedUser);
                document.getElementById('login-screen').style.display = 'none';
                updateUI();
            }
        }

        function login() {
            const nick = document.getElementById('login-nick').value;
            const money = document.getElementById('login-money').value;

            if(!nick || !money) return alert("Preencha tudo!");

            user = { nick: nick, balance: parseFloat(money) };
            localStorage.setItem('meta_user', JSON.stringify(user));
            location.reload();
        }

        function updateUI() {
            document.getElementById('display-nick').innerText = user.nick;
            document.getElementById('display-balance').innerText = user.balance.toLocaleString();
            
            renderProducts();
            renderHistory();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = produtos.map(p => `
                <div class="product-card">
                    <div style="background:#222; height:80px; display:flex; align-items:center; justify-content:center; font-size:2rem;">📦</div>
                    <h3>${p.nome}</h3>
                    <p style="color:#0f0">${p.preco} MC</p>
                    <button class="mc-button" 
                        ${user.balance >= p.preco ? '' : 'disabled'} 
                        onclick="buy(${p.id}, ${p.preco}, '${p.nome}')">
                        ${user.balance >= p.preco ? 'COMPRAR' : 'SEM SALDO'}
                    </button>
                </div>
            `).join('');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if(history.length === 0) return;
            
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    [${h.date}] comprou ${h.item} por ${h.price}
                </div>
            `).reverse().join('');
        }

        function buy(id, price, name) {
            if(user.balance < price) return;

            user.balance -= price;
            
            const now = new Date();
            const dateStr = now.getHours() + ":" + now.getMinutes();
            
            history.push({ item: name, price: price, date: dateStr });
            
            localStorage.setItem('meta_user', JSON.stringify(user));
            localStorage.setItem('meta_history', JSON.stringify(history));

            const alertBox = document.getElementById('custom-alert');
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);

            updateUI();
        }

        function logout() {
            localStorage.removeItem('meta_user');
            localStorage.removeItem('meta_history');
            location.reload();
        }
    </script>
</body>
</html>
